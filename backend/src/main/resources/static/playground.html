<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GraphQL Playground</title>
    <style>
      body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:16px}
      textarea{width:100%;height:220px;font-family:monospace}
      pre{white-space:pre-wrap;background:#f6f8fa;border:1px solid #ddd;padding:12px}
    </style>
  </head>
  <body>
    <h1>Simple GraphQL tester</h1>
    <p>Enter a GraphQL query and click <strong>Run</strong>. Use browser DevTools Network tab to inspect raw JSON, or view it below.</p>
    <textarea id="query">{
  recommendations {
    id
    name
    profilePicture
  }
}</textarea>
    <div style="margin-top:8px">
      <label>Authorization header (optional): <input id="auth" style="width:60%" placeholder="Bearer &lt;token&gt;" /></label>
      <button id="run" style="margin-left:8px">Run</button>
    </div>
    <h3>Response (JSON)</h3>
    <pre id="response">(no response yet)</pre>
    <script>
      async function run() {
        const q = document.getElementById('query').value;
        const auth = document.getElementById('auth').value.trim();
        const resEl = document.getElementById('response');
        try {
          const resp = await fetch('/graphql', {
            method: 'POST',
            headers: Object.assign({'Content-Type':'application/json'}, auth ? {'Authorization': auth} : {}),
            body: JSON.stringify({ query: q })
          });
          const text = await resp.text();
          try {
            const json = JSON.parse(text);
            resEl.textContent = JSON.stringify(json, null, 2);
          } catch(e) {
            resEl.textContent = text;
          }
        } catch(err) {
          resEl.textContent = 'Request failed: ' + err;
        }
      }
      document.getElementById('run').addEventListener('click', run);
    </script>
  </body>
</html>
